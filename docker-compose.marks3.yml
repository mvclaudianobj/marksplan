services:
  planka:
    build:
      context: .
      dockerfile: Dockerfile
    image: planka:marks3-local
    restart: on-failure
    volumes:
      - data:/app/data
    ports:
      - "${PLANKA_HOST_PORT:-20321}:1337"
    environment:
      BASE_URL: ${BASE_URL:-http://127.0.0.1:20321}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres@postgres/planka}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@marks.ia.br}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-Kenosis7!@#}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:-Marks Admin}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: on-failure
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-planka}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-trust}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d planka"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  data:
  db-data:
